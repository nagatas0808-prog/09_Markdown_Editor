<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="nDfNlMk2wvPV-koGT7Ur1MandTe503qb1CQ0kJw6fdA" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5383957100145583" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易マークダウン - 便利ツール集</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #d4d0c8;
            /* Windows 98/2000 灰色 */
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 10px;
        }

        .window {
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            padding: 2px;
            box-shadow: 1px 1px 0px #000;
        }

        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
        }

        .content {
            padding: 10px;
        }

        table.editor-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 5px;
        }

        table.editor-table td {
            width: 50%;
            vertical-align: top;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: #ffffff;
            color: #000000;
            border: 2px inset #ffffff;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            padding: 5px;
            box-sizing: border-box;
        }

        .preview-area {
            width: 100%;
            height: 400px;
            background-color: #ffffff;
            color: #000000;
            border: 2px inset #ffffff;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* プレビュー内のレトロHTML装飾 */
        .preview-area h1 {
            border-bottom: 2px solid #000;
            font-size: 1.5em;
        }

        .preview-area h2 {
            border-bottom: 1px solid #000;
            font-size: 1.3em;
        }

        .preview-area code {
            background: #eee;
            padding: 2px;
            border: 1px solid #ccc;
        }

        .preview-area blockquote {
            border-left: 5px solid #ccc;
            margin-left: 0;
            padding-left: 10px;
            color: #666;
        }

        .toolbar {
            margin-bottom: 5px;
        }

        .toolbar button {
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            margin-right: 2px;
            padding: 2px 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .toolbar button:active {
            border: 2px inset #ffffff;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            border-top: 1px solid #808080;
            padding-top: 5px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">
                📝 簡易マークダウンエディタ - [新しき文書]
            </div>
            <div style={{fontSize: '10px' }}>×</div>
        </div>
        <div class="content">
            <div id="root"></div>
        </div>
        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const SAMPLE = `# 簡易マークダウンへようこそ！
左側のテキストエリアにMarkdownを記入すると、右側にリアルタイムでプレビューが表示されます。

## 機能
- **太字** や *斜体*
- [リンクの作成](http://landisk-f9d50c/)
- リスト形式
  1. 番号付き
  2. 箇条書き

> 引用も使えます。

\`コード\` も書けますよ。
`;

        const App = () => {
            const [markdown, setMarkdown] = React.useState(SAMPLE);

            const getHTML = () => {
                try {
                    return { __html: marked.parse(markdown) };
                } catch (e) {
                    return { __html: 'Error: Cannot parse markdown.' };
                }
            };

            const insertText = (text) => {
                setMarkdown(prev => prev + "\n" + text);
            }

            return (
                <div>
                    <div class="toolbar">
                        <button onClick={() => insertText('# ')}>H1</button>
                        <button onClick={() => insertText('## ')}>H2</button>
                        <button onClick={() => insertText('**太字**')}>B</button>
                        <button onClick={() => insertText('*斜体*')}>I</button>
                        <button onClick={() => insertText('- ')}>List</button>
                        <button onClick={() => insertText('> ')}>Quote</button>
                        <button onClick={() => setMarkdown('')}>新規(クリア)</button>
                    </div>
                    <table class="editor-table">
                        <tr>
                            <td>
                                <div style={{ fontSize: '11px', marginBottom: '2px' }}>テキスト入力：</div>
                                <textarea value={markdown} onChange={(e) => setMarkdown(e.target.value)} spellCheck="false" />
                            </td>
                            <td>
                                <div style={{ fontSize: '11px', marginBottom: '2px' }}>HTMLプレビュー：</div>
                                <div class="preview-area" dangerouslySetInnerHTML={getHTML()} />
                            </td>
                        </tr>
                    </table>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/5dfe8bfce49a43ffe78096b109972b5b"></script>
    <!-- admax -->
</body>

</html>
